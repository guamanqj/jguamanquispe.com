# config.toml
#baseURL = "https://guamanqj.github.io/jguamanquispe.com/"
baseURL = "https://jguamanquispe.com/"
languageCode = "en"
title = "Professional Portfolio | Data Engineer & Scientist"
theme = "hugo-coder"


[params]
    author = "Johnny R. Guamanquispe"
    # This 'description' is for Search Engines (SEO)
    description = "Data professional with 11+ years of expertise in Data Engineering, BI Architecture, and Machine Learning. M.S. in Computer Science graduate specializing in Python, SQL, and GCP."
    
    # THIS is what actually displays on the home page under your name
    info = "Data Engineer & Scientist | M.S. in Computer Science | 11+ Years Experience"
    
    keywords = "data engineering, data science, python, sql, etl, pytorch"
    avatarURL = "images/avatar.png"
    siteName = "jguamanquispe.com"
    footerContent = "Built with Hugo and ☕"
    
    # Appearance settings
    colorScheme = "auto"
    hideFooter = false
    hideCredits = false
    
    # Social links for the home page icons
    [[params.social]]
        name = "Github"
        icon = "fa fa-2x fa-github"
        weight = 1
        url = "https://github.com/guamanqj/"
    [[params.social]]
        name = "LinkedIn"
        icon = "fa fa-2x fa-linkedin"
        weight = 2
        url = "https://www.linkedin.com/in/jguamanquispe/"
    [[params.social]]
        name = "Email"
        icon = "fa fa-2x fa-envelope"
        weight = 3
        url = "mailto:jguamanquispe@gmail.com"

    # Other params...
    customCSS = ["static/css/custom.css"]
    customJS = ["static/js/custom.js"]

# The Navigation Menu (Top right of your site)
[[menu.main]]
    name = "About"
    weight = 1
    url = "about/"
[[menu.main]]
    name = "Experience"
    weight = 2
    url = "experience/"
[[menu.main]]
    name = "Projects"
    weight = 3
    url = "projects/"
[[menu.main]]
    name = "Contact"
    weight = 4
    url = "contact/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # Allows you to use some HTML (like embedded Tableau charts) in Markdown